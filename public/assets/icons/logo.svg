<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#a9663f" stroke-width="2.5" filter="url(#rough)" opacity="0.85"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#a9663f" stroke-width="1" filter="url(#rough)" opacity="0.45"/>
  <text x="100" y="128" font-family="Georgia, 'Playfair Display', serif" font-size="76" font-weight="700"
        text-anchor="middle" fill="#a9663f" filter="url(#rough)" opacity="0.95" letter-spacing="-2">A&#8202;I</text>
</svg>
